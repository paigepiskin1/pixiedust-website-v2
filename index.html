<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixiedust</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .sparkle { font-size: 2rem; margin-bottom: 1rem; }

    h1 {
      font-size: 3.5rem;
      background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #64748b;
      margin-bottom: 2.5rem;
    }

    .generator {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      background: #1e1e30;
      border: 1px solid #2d2d4a;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      padding: 0.85rem 1.2rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: #4a4a6a; }
    input[type="text"]:focus { border-color: #818cf8; }

    button {
      background: linear-gradient(135deg, #c084fc, #818cf8);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      font-size: 0.9rem;
      color: #64748b;
      text-align: center;
      min-height: 1.2rem;
    }

    .status.error { color: #f87171; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .image-frame {
      width: 100%;
      aspect-ratio: 1;
      background: #1e1e30;
      border: 1px solid #2d2d4a;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .image-frame.done { border-color: #818cf8; }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .image-frame img.visible { display: block; }

    .placeholder-text {
      color: #2d2d4a;
      font-size: 0.85rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2d2d4a;
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      position: absolute;
    }

    .spinner.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sparkle">✨</div>
  <h1>Pixiedust</h1>
  <p class="tagline">Type a prompt. Get 4 variations.</p>

  <div class="generator">
    <div class="input-row">
      <input type="text" id="prompt"
        value="a magical fairy kitten with glowing wings, fantasy art, soft pastel colors, detailed illustration, cute"
        placeholder="a glowing fairy kitten…" />
      <button id="generateBtn">Generate</button>
    </div>
    <div class="status" id="status"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const PROXY_URL = "http://localhost:3001";
    const MODEL = "black-forest-labs/flux-schnell";

    const btn = document.getElementById("generateBtn");
    const promptEl = document.getElementById("prompt");
    const statusEl = document.getElementById("status");
    const grid = document.getElementById("grid");

    function makeFrame() {
      const frame = document.createElement("div");
      frame.className = "image-frame";

      const placeholder = document.createElement("div");
      placeholder.className = "placeholder-text";
      placeholder.textContent = "Generating…";

      const spinner = document.createElement("div");
      spinner.className = "spinner visible";

      const img = document.createElement("img");
      img.alt = "Generated image";

      frame.append(placeholder, spinner, img);
      return { frame, placeholder, spinner, img };
    }

    async function submitJob(prompt) {
      const res = await fetch(`${PROXY_URL}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: MODEL,
          input: { prompt, width: 512, height: 512, num_outputs: 1 },
        }),
      });
      return res.json();
    }

    async function pollUntilDone(jobId) {
      while (true) {
        const res = await fetch(`${PROXY_URL}/status?job_id=${jobId}`);
        const data = await res.json();
        console.log(`[poll ${jobId.slice(-6)}]`, data);

        const succeeded =
          data.replicate_status === "succeeded" ||
          data.task_status === "COMPLETED" ||
          data.task_status === "SUCCEEDED" ||
          data.status === "completed";

        const failed =
          data.replicate_status === "failed" ||
          data.task_status === "FAILED" ||
          data.status === "failed";

        if (succeeded || (data.output && !failed)) {
          const out = data.output;
          return Array.isArray(out) ? out[0] : out;
        }
        if (failed) throw new Error(`Job ${jobId} failed`);

        await new Promise(r => setTimeout(r, 2000));
      }
    }

    async function runOne(prompt, { frame, placeholder, spinner, img }) {
      try {
        const job = await submitJob(prompt);
        const url = await pollUntilDone(job.job_id);
        img.src = url;
        img.onload = () => {
          spinner.classList.remove("visible");
          placeholder.style.display = "none";
          img.classList.add("visible");
          frame.classList.add("done");
        };
      } catch {
        spinner.classList.remove("visible");
        placeholder.textContent = "Failed";
        placeholder.style.color = "#f87171";
      }
    }

    async function run() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      btn.disabled = true;
      grid.innerHTML = "";
      statusEl.className = "status";
      statusEl.textContent = "Submitting 4 jobs…";

      const slots = Array.from({ length: 4 }, makeFrame);
      slots.forEach(({ frame }) => grid.appendChild(frame));

      let done = 0;
      statusEl.textContent = "Generating… (0 / 4 done)";

      await Promise.allSettled(
        slots.map((slot) =>
          runOne(prompt, slot).then(() => {
            done++;
            statusEl.textContent =
              done < 4 ? `Generating… (${done} / 4 done)` : "All 4 done! ✨";
          })
        )
      );

      btn.disabled = false;
    }

    btn.addEventListener("click", run);
    promptEl.addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
  </script>
</body>
</html>
