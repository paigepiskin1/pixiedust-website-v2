name = "pixiedust-web"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Secrets (SYNCNODE_API_KEY, BUNNY_*, Stripe, etc.) are NEVER set
# here — use `wrangler pages secret put <NAME>` / Pages env vars.

# D1 — primary database (users, templates, generations, credit ledger, ...)
[[d1_databases]]
binding = "DB"
database_name = "pixiedust"
database_id = "105e2276-0d51-430a-8c6f-b4f7ee699aaf"

# KV — sessions, cache, rate limits
[[kv_namespaces]]
binding = "SESSIONS"
id = "9df6495725ab49d481572c05b089e13c"
